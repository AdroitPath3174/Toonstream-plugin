name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean Gradle Cache
        run: rm -rf ~/.gradle/caches

      - name: Build Plugin
        run: ./gradlew :Toonstream:build --no-daemon

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: Toonstream-build
          path: Toonstream/build/
